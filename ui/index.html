<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calendar</title>
        <link rel="stylesheet" type="text/css" href="display.css">
        <link rel="stylesheet" type="text/css" href="layout.css">
        <link rel="stylesheet" type="text/css" href="theme.css">
    </head>
    <body>
        <div id="app" class="app">
            <div id="app-body" class="app-body">
                <div id="conversation" class="conversation">
                    <!--
                        BASIC UI
                        text bubbles from each "person"
                        the users messages are on the right
                        the chat's are on the left
                        the user's chats are the accent color, maybe shadowed?
                        the chat's are grey, maybe shadowed with accent color

                        the chat wil consist of "lines" or blocks.
                        only one block can be owned by one "person".
                        each block will have its own css styles, split into respective files.
                    -->
                    <div id="welcome-message" class="welcome-message">
                        <p>Knowledge is power</p>
                        <p>Ingenuity is freedom</p>
                    </div>
                    <template id="chat-block-template">
                        <div class="message-block chat-block">
                            <div class="time-block chat-time">
                                <div class="time-part"></div>
                                <div class="date-part"></div>
                            </div>
                            <div class="message-text chat-message"></div>
                        </div>
                    </template>
                    <template id="user-block-template">
                        <div class="message-block user-block">
                            <div class="time-block user-time">
                                <div class="time-part"></div>
                                <div class="date-part"></div>
                            </div>
                            <div class="message-text user-message"></div>
                        </div>
                    </template>
                    <div id="chat-begining" class="chat-begining hidden"></div>
                    <div id="messages" class="messages" style="display: none;"></div>
                    <span id="loader" class="loader-animation hidden"></span>
                </div>
                <div id="prompt" class="prompt">
                    <div id="prompt-input"  class="prompt-input">
                        <div id="prompt-text" class="prompt-text" contenteditable="true"></div>
                    </div>
                    <div id="prompt-buttons" class="prompt-buttons">
                        <!--
                        <button class="util-button">Add File</button>
                        <button class="util-button">Extend Thninking</button>
                        -->
                        <button id="submit-prompt">Submit</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="index.js" type="module"></script>
    </body>
</html>
